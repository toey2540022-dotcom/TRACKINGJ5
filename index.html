<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omoda & Jaecoo Tracker</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- SheetJS (Excel) โหลดแบบ defer เพื่อไม่ให้บล็อกการแสดงผลหน้าเว็บ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>

  <style>
    /* ซ่อนลูกศรเริ่มต้นของ details/summary */
    details > summary { list-style: none; }
    details > summary::-webkit-details-marker { display: none; }
    
    /* ไอคอนหมุนเมื่อ details เปิด */
    details[open] > summary .chevron-icon { transform: rotate(90deg); }
    .chevron-icon { transition: transform 0.2s ease-in-out; }

    /* Toast Animation */
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    .toast-enter { animation: slideIn 0.3s ease-out forwards; }
    .toast-exit { animation: fadeOut 0.3s ease-out forwards; }
  </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

  <!-- Header -->
  <header class="bg-slate-900 text-white sticky top-0 z-40 shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center space-x-2">
          <i data-lucide="car" class="w-8 h-8 text-blue-400"></i>
          <span class="font-bold text-xl tracking-tight">O&J Tracker</span>
        </div>
        <div class="flex items-center text-xs text-gray-400" id="connection-status">
           <div class="w-2 h-2 rounded-full mr-2 bg-red-500 animate-pulse" id="status-dot"></div>
           <span id="status-text">Connecting...</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Tabs Navigation -->
  <div class="bg-white border-b border-gray-200 sticky top-16 z-30">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <nav class="flex space-x-6 overflow-x-auto" id="tabs-container">
        <!-- Tabs generated via JS -->
      </nav>
    </div>
  </div>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" id="app-content">
    <!-- Content injected via JS -->
  </main>

  <!-- Toast Notifications Container -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

  <!-- Firebase & Application Logic -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    // เปลี่ยนจาก Firestore เป็น Realtime Database
    import { getDatabase, ref, set, push, remove, update, onValue } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

    // --- Configuration ---
    const userFirebaseConfig = {
      apiKey: "AIzaSyBS8XAd5IGDmZmz2n-N01ag7k5Yo0m5fQ0",
      authDomain: "jaecooj5-b986e.firebaseapp.com",
      databaseURL: "https://jaecooj5-b986e-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "jaecooj5-b986e",
      storageBucket: "jaecooj5-b986e.firebasestorage.app",
      messagingSenderId: "129535264155",
      appId: "1:129535264155:web:2885d1e4e7b71afca3cd3e",
      measurementId: "G-4XM56N6MH4"
    };

    const firebaseConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : JSON.stringify(userFirebaseConfig);
    const firebaseConfig = JSON.parse(firebaseConfigStr);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app); // ใช้ Realtime DB
    
    const rawAppId = typeof __app_id !== 'undefined' ? __app_id : 'omoda-jaecoo-tracker';
    // ทำความสะอาดรหัสโปรเจกต์ให้เหลือแค่ตัวอักษรและตัวเลข ป้องกัน Error จากอักขระพิเศษใน Firebase อย่างเด็ดขาด
    const appId = String(rawAppId).replace(/[^a-zA-Z0-9_-]/g, '_');

    const CAR_COLORS = ["White (ขาว)", "Black (ดำ)", "Grey (เทา)", "Green (เขียว)", "Silver (เงิน)", "Blue (น้ำเงิน)"];
    const CAR_MODELS = ["OMODA C5 EV", "JAECOO 6", "JAECOO J5", "JAECOO J6", "JAECOO 7 PHEV", "JAECOO 8 PHEV"];

    // --- Global State ---
    const state = {
      tab: 'dashboard',
      user: null,
      isAdmin: false,
      dealersData: [],
      inventory: [],
      bookings: [],
      selectedMetric: null,
      // เก็บค่าฟอร์มไว้ทั้งหมดเพื่อป้องกันข้อมูลหายตอนเรนเดอร์ใหม่
      dealerForm: { province: '', dealer: '', model: '', color: '', qty: '' },
      buyerForm: { customerName: '', province: '', dealer: '', model: '', color: '' },
      editingInventoryId: null,
      editQtyValue: '',
      editingBookingId: null
    };

    // --- Toast Notification System ---
    window.showToast = function(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      
      let bgColor = 'bg-blue-600';
      let icon = 'info';
      if (type === 'success') { bgColor = 'bg-emerald-600'; icon = 'check-circle'; }
      if (type === 'error') { bgColor = 'bg-red-600'; icon = 'alert-triangle'; }
      if (type === 'warning') { bgColor = 'bg-orange-500'; icon = 'alert-circle'; }

      toast.className = `toast-enter flex items-center p-4 text-white rounded-lg shadow-lg ${bgColor}`;
      toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5 mr-3"></i> <span>${message}</span>`;
      
      container.appendChild(toast);
      lucide.createIcons({ root: toast });

      setTimeout(() => {
        toast.classList.replace('toast-enter', 'toast-exit');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    };

    // --- Firebase Auth & Subscriptions ---
    async function initFirebase() {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (error) {
        console.error("Auth Error:", error);
        if(error.code === 'auth/operation-not-allowed') {
            showToast("เชื่อมต่อล้มเหลว: โปรดเปิดใช้งาน 'Anonymous Sign-in' ใน Firebase Console", "error");
        } else {
            showToast("การเชื่อมต่อล้มเหลว: " + error.message, "error");
        }
        
        const text = document.getElementById('status-text');
        const dot = document.getElementById('status-dot');
        if(text && dot) {
            text.innerText = 'Connection Failed';
            dot.className = 'w-2 h-2 rounded-full mr-2 bg-red-600';
            dot.classList.remove('animate-pulse');
        }
      }
    }

    let unsubscribes = [];
    onAuthStateChanged(auth, (user) => {
      state.user = user;
      updateConnectionStatus();
      
      // Cleanup previous subscriptions
      unsubscribes.forEach(unsub => unsub());
      unsubscribes = [];

      if (user) {
        // Data References in Realtime Database
        const dealersRef = ref(db, `artifacts/${appId}/public/data/settings/dealersList`);
        const inventoryRef = ref(db, `artifacts/${appId}/public/data/inventory`);
        const bookingsRef = ref(db, `artifacts/${appId}/public/data/bookings`);

        const unsubDealers = onValue(dealersRef, (snap) => {
          state.dealersData = snap.exists() ? (snap.val().list || []) : [];
          renderApp(); // รีเรนเดอร์เมื่อข้อมูลอัปเดต
        }, err => console.error(err));

        const unsubInventory = onValue(inventoryRef, (snap) => {
          const data = [];
          if (snap.exists()) {
            snap.forEach((child) => {
              data.push({ id: child.key, ...child.val() });
            });
          }
          state.inventory = data;
          renderApp();
        }, err => console.error(err));

        const unsubBookings = onValue(bookingsRef, (snap) => {
          const data = [];
          if (snap.exists()) {
            snap.forEach((child) => {
              data.push({ id: child.key, ...child.val() });
            });
          }
          state.bookings = data;
          renderApp();
        }, err => console.error(err));
        
        unsubscribes.push(unsubDealers, unsubInventory, unsubBookings);
      } else {
        renderApp();
      }
    });

    function updateConnectionStatus() {
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      if (state.user) {
        dot.className = 'w-2 h-2 rounded-full mr-2 bg-green-500';
        text.innerText = 'Cloud Connected';
      } else {
        dot.className = 'w-2 h-2 rounded-full mr-2 bg-red-500 animate-pulse';
        text.innerText = 'Connecting...';
      }
    }

    initFirebase();

    // --- Computed Stats ---
    function getCalculatedStats() {
      let totalCars = 0, totalBooked = 0, totalDelivered = 0, totalShortage = 0;
      const dealerMap = {};

      state.dealersData.forEach(d => {
        dealerMap[d.name] = {
          region: d.region, province: d.province, dealer: d.name,
          totalCars: 0, totalBooked: 0, totalDelivered: 0, totalShortage: 0,
          demandByColor: {}, supplyByColor: {}
        };
      });

      state.inventory.forEach(item => {
        if (!dealerMap[item.dealer]) {
          dealerMap[item.dealer] = { region: 'อื่นๆ', province: 'อื่นๆ', dealer: item.dealer, totalCars: 0, totalBooked: 0, totalDelivered: 0, totalShortage: 0, demandByColor: {}, supplyByColor: {} };
        }
        dealerMap[item.dealer].totalCars += item.qty;
        const key = `${item.model}-${item.color}`;
        dealerMap[item.dealer].supplyByColor[key] = (dealerMap[item.dealer].supplyByColor[key] || 0) + item.qty;
        totalCars += item.qty;
      });

      state.bookings.forEach(b => {
        if (!dealerMap[b.dealer]) {
          dealerMap[b.dealer] = { region: 'อื่นๆ', province: 'อื่นๆ', dealer: b.dealer, totalCars: 0, totalBooked: 0, totalDelivered: 0, totalShortage: 0, demandByColor: {}, supplyByColor: {} };
        }
        const key = `${b.model}-${b.color}`;
        if (b.status === 'booked') {
          dealerMap[b.dealer].totalBooked += 1;
          dealerMap[b.dealer].demandByColor[key] = (dealerMap[b.dealer].demandByColor[key] || 0) + 1;
          totalBooked += 1;
        }
        if (b.status === 'delivered') {
          dealerMap[b.dealer].totalDelivered += 1;
          dealerMap[b.dealer].supplyByColor[key] = Math.max(0, (dealerMap[b.dealer].supplyByColor[key] || 0) - 1);
          totalDelivered += 1;
        }
      });

      Object.values(dealerMap).forEach(d => {
        Object.keys(d.demandByColor).forEach(key => {
          const demand = d.demandByColor[key];
          const supply = d.supplyByColor[key] || 0;
          if (demand > supply) {
            const shortageQty = demand - supply;
            d.totalShortage += shortageQty;
            totalShortage += shortageQty;
          }
        });
      });

      const grouped = {};
      Object.values(dealerMap).forEach(d => {
        if (!grouped[d.region]) grouped[d.region] = {};
        if (!grouped[d.region][d.province]) grouped[d.region][d.province] = [];
        grouped[d.region][d.province].push(d);
      });

      return { totalCars, totalBooked, totalDelivered, totalShortage, grouped };
    }

    function getProvinces() {
      return [...new Set(state.dealersData.map(d => d.province))].sort();
    }

    function getDealersByProvince(province) {
      if (!province) return [];
      return state.dealersData.filter(d => d.province === province).map(d => d.name);
    }

    function getDealerInfo(dealerName, province) {
      return state.dealersData.find(d => d.name === dealerName && d.province === province);
    }

    // --- App Actions (Global) ---
    window.appActions = {
      switchTab: (tabId) => {
        state.tab = tabId;
        renderApp();
      },
      selectMetric: (metric) => {
        state.selectedMetric = state.selectedMetric === metric ? null : metric;
        renderApp();
      },
      dealerProvinceChange: (val) => {
        // บันทึกค่าอื่นๆ ที่กรอกไว้เพื่อไม่ให้หายตอนรีเฟรชหน้าจอ
        state.dealerForm.model = document.querySelector('select[name="model"]')?.value || '';
        state.dealerForm.color = document.querySelector('select[name="color"]')?.value || '';
        state.dealerForm.qty = document.querySelector('input[name="qty"]')?.value || '';
        
        state.dealerForm.province = val;
        state.dealerForm.dealer = ''; // Reset dealer
        renderApp();
      },
      dealerNameChange: (val) => {
        state.dealerForm.model = document.querySelector('select[name="model"]')?.value || '';
        state.dealerForm.color = document.querySelector('select[name="color"]')?.value || '';
        state.dealerForm.qty = document.querySelector('input[name="qty"]')?.value || '';
        
        state.dealerForm.dealer = val;
        renderApp();
      },
      buyerProvinceChange: (val) => {
        state.buyerForm.customerName = document.querySelector('input[name="customerName"]')?.value || '';
        state.buyerForm.model = document.querySelector('select[name="model"]')?.value || '';
        state.buyerForm.color = document.querySelector('select[name="color"]')?.value || '';
        
        state.buyerForm.province = val;
        state.buyerForm.dealer = ''; // Reset dealer
        renderApp();
      },
      buyerNameChange: (val) => {
        state.buyerForm.customerName = document.querySelector('input[name="customerName"]')?.value || '';
        state.buyerForm.model = document.querySelector('select[name="model"]')?.value || '';
        state.buyerForm.color = document.querySelector('select[name="color"]')?.value || '';
        
        state.buyerForm.dealer = val;
        renderApp();
      },
      adminLogin: (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        if (fd.get('username') === 'admin888' && fd.get('password') === '999999999') {
          state.isAdmin = true;
          renderApp();
          showToast('เข้าสู่ระบบสำเร็จ', 'success');
        } else {
          showToast('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง', 'error');
        }
      },
      adminLogout: () => {
        state.isAdmin = false;
        renderApp();
      },
      receiveCar: async (id) => {
        if (!state.user) return showToast("ไม่ได้เชื่อมต่อฐานข้อมูล", "error");
        try {
          const bookingRef = ref(db, `artifacts/${appId}/public/data/bookings/${id}`);
          await update(bookingRef, { status: 'delivered' });
          showToast('ยืนยันการรับรถสำเร็จ', 'success');
        } catch (error) {
          showToast("เกิดข้อผิดพลาด: " + error.message, "error");
        }
      },
      submitDealerForm: async (e) => {
        e.preventDefault();
        if (!state.user) return showToast("รอการเชื่อมต่อฐานข้อมูลสักครู่", "warning");
        
        const fd = new FormData(e.target);
        const province = fd.get('province');
        const dealer = fd.get('dealer');
        const model = fd.get('model');
        const color = fd.get('color');
        const qty = parseInt(fd.get('qty'), 10);

        if (!dealer || !model || !color || qty <= 0) return showToast("กรุณากรอกข้อมูลให้ครบถ้วนและถูกต้อง", "warning");
        
        // Validate from DB
        const isValidDealer = state.dealersData.some(d => d.province === province && d.name === dealer);
        if (!isValidDealer) return showToast("ไม่พบสาขานี้ในระบบ โปรดเลือกจากรายการ", "error");

        try {
          const existing = state.inventory.find(item => item.dealer === dealer && item.model === model && item.color === color);
          if (existing) {
            const itemRef = ref(db, `artifacts/${appId}/public/data/inventory/${existing.id}`);
            await update(itemRef, { qty: existing.qty + qty });
          } else {
            const invListRef = ref(db, `artifacts/${appId}/public/data/inventory`);
            await push(invListRef, { dealer, model, color, qty });
          }
          showToast('อัปเดตสต็อกสำเร็จ!', 'success');
          
          // ล้างข้อมูลเพื่อความสะดวกในการเพิ่มสีต่อไป
          state.dealerForm.model = '';
          state.dealerForm.color = '';
          state.dealerForm.qty = '';
          e.target.reset();
          renderApp();
        } catch (error) {
          showToast("เกิดข้อผิดพลาด: " + error.message, "error");
        }
      },
      startEditInventory: (id, currentQty) => {
        state.editingInventoryId = id;
        state.editQtyValue = currentQty;
        renderApp();
      },
      cancelEditInventory: () => {
        state.editingInventoryId = null;
        renderApp();
      },
      saveEditInventory: async (id) => {
        if (!state.user) return;
        const newQty = parseInt(document.getElementById(`edit-qty-${id}`).value, 10);
        if (isNaN(newQty) || newQty < 0) return showToast("จำนวนไม่ถูกต้อง", "warning");

        try {
          const itemRef = ref(db, `artifacts/${appId}/public/data/inventory/${id}`);
          if (newQty === 0) {
            await remove(itemRef);
          } else {
            await update(itemRef, { qty: newQty });
          }
          state.editingInventoryId = null;
          showToast('แก้ไขข้อมูลสำเร็จ', 'success');
        } catch (error) {
          showToast("เกิดข้อผิดพลาด: " + error.message, "error");
        }
      },
      deleteInventory: async (id) => {
        if (!state.user) return;
        if (confirm('คุณแน่ใจหรือไม่ว่าต้องการลบรายการสต็อกนี้?')) {
          try {
            const itemRef = ref(db, `artifacts/${appId}/public/data/inventory/${id}`);
            await remove(itemRef);
            showToast('ลบรายการสำเร็จ', 'success');
          } catch (error) {
            showToast("เกิดข้อผิดพลาด: " + error.message, "error");
          }
        }
      },
      startEditBooking: (id) => {
        state.editingBookingId = id;
        renderApp();
      },
      cancelEditBooking: () => {
        state.editingBookingId = null;
        renderApp();
      },
      saveEditBooking: async (id) => {
        if (!state.user) return;
        const newName = document.getElementById(`edit-b-name-${id}`).value;
        const newModel = document.getElementById(`edit-b-model-${id}`).value;
        const newColor = document.getElementById(`edit-b-color-${id}`).value;

        if (!newName || !newModel || !newColor) return showToast("กรุณากรอกข้อมูลให้ครบถ้วน", "warning");

        try {
          const bookingRef = ref(db, `artifacts/${appId}/public/data/bookings/${id}`);
          await update(bookingRef, { customerName: newName, model: newModel, color: newColor });
          state.editingBookingId = null;
          showToast('แก้ไขข้อมูลการจองสำเร็จ', 'success');
        } catch (error) {
          showToast("เกิดข้อผิดพลาด: " + error.message, "error");
        }
      },
      deleteBooking: async (id) => {
        if (!state.user) return;
        if (confirm('คุณแน่ใจหรือไม่ว่าต้องการยกเลิกการจองรายการนี้?')) {
          try {
            const bookingRef = ref(db, `artifacts/${appId}/public/data/bookings/${id}`);
            await remove(bookingRef);
            showToast('ยกเลิกการจองสำเร็จ', 'success');
          } catch (error) {
            showToast("เกิดข้อผิดพลาด: " + error.message, "error");
          }
        }
      },
      submitBuyerForm: async (e) => {
        e.preventDefault();
        if (!state.user) return showToast("รอการเชื่อมต่อฐานข้อมูลสักครู่", "warning");
        
        const fd = new FormData(e.target);
        const customerName = fd.get('customerName');
        const province = fd.get('province');
        const dealer = fd.get('dealer');
        const model = fd.get('model');
        const color = fd.get('color');

        if (!customerName || !dealer || !model || !color) return showToast("กรุณากรอกข้อมูลให้ครบถ้วน", "warning");

        const isValidDealer = state.dealersData.some(d => d.province === province && d.name === dealer);
        if (!isValidDealer) return showToast("ไม่พบสาขานี้ในระบบ โปรดเลือกจากรายการ", "error");

        try {
          const bookingsRef = ref(db, `artifacts/${appId}/public/data/bookings`);
          await push(bookingsRef, {
            customerName, province, dealer, model, color,
            status: 'booked', createdAt: Date.now()
          });
          
          showToast('บันทึกการจองสำเร็จ!', 'success');
          
          // ล้างข้อมูลเพื่อพร้อมรับคิวใหม่
          state.buyerForm.customerName = '';
          state.buyerForm.dealer = '';
          state.buyerForm.model = '';
          state.buyerForm.color = '';
          e.target.reset();
          renderApp();
        } catch (error) {
          showToast("เกิดข้อผิดพลาด: " + error.message, "error");
        }
      },
      uploadExcel: (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (!window.XLSX) {
          return showToast('ระบบกำลังโหลดโปรแกรมอ่านไฟล์ Excel กรุณารอสักครู่', 'warning');
        }
        if (!state.user) {
          return showToast('กรุณารอระบบเชื่อมต่อฐานข้อมูลสักครู่...', 'warning');
        }

        const reader = new FileReader();
        reader.onload = async (event) => {
          try {
            const data = new Uint8Array(event.target.result);
            const workbook = window.XLSX.read(data, { type: 'array' });
            const targetSheetName = workbook.SheetNames.find(name => name.includes('รายชื่อ')) || workbook.SheetNames[0];
            const worksheet = workbook.Sheets[targetSheetName];
            const jsonData = window.XLSX.utils.sheet_to_json(worksheet, { header: 1 });
            
            const newData = [];
            for (let i = 1; i < jsonData.length; i++) {
              const row = jsonData[i];
              if (!row || row.length === 0) continue;
              
              const region = row[0] ? String(row[0]).trim() : '-';
              const name = row[1] ? String(row[1]).trim() : '-';
              const province = row[2] ? String(row[2]).trim() : '-';
              const address = row[3] ? String(row[3]).trim() : '-';
              const phone = row[4] ? String(row[4]).trim() : '-';

              if (name !== '-' && province !== '-' && name !== 'ชื่อโชว์รูม/ศูนย์บริการ') {
                newData.push({ region, name, province, address, phone });
              }
            }

            if (newData.length > 0) {
              const dealersDocRef = ref(db, `artifacts/${appId}/public/data/settings/dealersList`);
              await set(dealersDocRef, { list: newData });
              showToast(`อัปโหลดสำเร็จทั้งหมด ${newData.length} สาขา!`, 'success');
            } else {
              showToast('ไม่พบข้อมูลสาขา หรือรูปแบบคอลัมน์ไม่ถูกต้อง', 'error');
            }
          } catch (error) {
            console.error(error);
            showToast('เกิดข้อผิดพลาดในการอ่านไฟล์', 'error');
          }
        };
        reader.readAsArrayBuffer(file);
      }
    };


    // --- Render Functions ---
    function renderApp() {
      renderTabs();
      
      const content = document.getElementById('app-content');
      if (state.tab === 'dashboard') content.innerHTML = getDashboardHTML();
      else if (state.tab === 'dealer') content.innerHTML = getDealerHTML();
      else if (state.tab === 'buyer') content.innerHTML = getBuyerHTML();
      else if (state.tab === 'database') content.innerHTML = getDatabaseHTML();

      lucide.createIcons();
    }

    function renderTabs() {
      const tabs = [
        { id: 'dashboard', label: 'แดชบอร์ดสรุปผล', icon: 'bar-chart-3', color: 'blue' },
        { id: 'dealer', label: 'ดีลเลอร์ (อัปเดตสต็อก)', icon: 'store', color: 'blue' },
        { id: 'buyer', label: 'ลูกค้า (จอง/รับรถ)', icon: 'users', color: 'orange' },
        { id: 'database', label: 'ตั้งค่าฐานข้อมูลสาขา', icon: 'database', color: 'emerald' }
      ];

      const html = tabs.map(t => {
        const isActive = state.tab === t.id;
        const colorClass = isActive ? `border-${t.color}-500 text-${t.color}-600` : `border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300`;
        return `
          <button onclick="appActions.switchTab('${t.id}')" 
            class="${colorClass} whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm flex items-center transition-colors">
            <i data-lucide="${t.icon}" class="w-5 h-5 mr-2"></i> ${t.label}
          </button>
        `;
      }).join('');

      document.getElementById('tabs-container').innerHTML = html;
    }

    // --- Sub-views ---

      return `
        <div class="mt-3 p-4 bg-blue-50 border border-blue-100 rounded-lg text-sm">
          <div class="flex items-start mb-2">
            <i data-lucide="map" class="w-4 h-4 text-blue-500 mr-2 mt-0.5 flex-shrink-0"></i>
            <span class="text-gray-700"><strong>ที่อยู่:</strong> ${dealerInfo.address}</span>
          </div>
          <div class="flex items-center">
            <i data-lucide="phone" class="w-4 h-4 text-blue-500 mr-2 flex-shrink-0"></i>
            <span class="text-gray-700"><strong>เบอร์ติดต่อ:</strong> ${dealerInfo.phone}</span>
          </div>
          <div class="mt-2 text-xs text-blue-600 font-medium bg-blue-100 px-2 py-1 rounded inline-block">
            ภูมิภาค: ${dealerInfo.region}

    function getDatalistHTML(id, options) {
      return `<datalist id="${id}">${options.map(opt => `<option value="${opt}"></option>`).join('')}</datalist>`;
    }

    function getDashboardHTML() {
      const stats = getCalculatedStats();
      
      const statCard = (title, val, icon, metricKey, bg, text, ring) => {
        const isActive = state.selectedMetric === metricKey;
        const baseClass = isActive ? `ring-2 ring-offset-2 ${ring} border-transparent bg-slate-50` : 'border-gray-100 hover:border-gray-300 hover:bg-gray-50';
        const valClass = isActive ? text : 'text-gray-800';
        return `
          <button onclick="appActions.selectMetric('${metricKey}')" class="w-full text-left bg-white p-6 rounded-xl shadow-sm border transition-all duration-200 flex items-center space-x-4 ${baseClass}">
            <div class="p-3 ${bg} ${text} rounded-lg"><i data-lucide="${icon}" class="w-8 h-8"></i></div>
            <div>
              <p class="text-sm text-gray-500 font-medium">${title}</p>
              <p class="text-2xl font-bold ${valClass}">${val} <span class="text-sm font-normal text-gray-500">คัน</span></p>
            </div>
          </button>
        `;
      };

      let bottomView = '';
      if (state.selectedMetric) {
        // Drill-down View
        const configs = {
          totalCars: { label: "รถเข้ามาทั้งหมด", unit: "คัน", color: "text-blue-600" },
          totalBooked: { label: "จองแล้ว (รอรับรถ)", unit: "คัน", color: "text-orange-600" },
          totalShortage: { label: "สถานะรถขาด", unit: "คัน", color: "text-red-600" },
          totalDelivered: { label: "รับรถไปแล้ว", unit: "คัน", color: "text-green-600" }
        };
        const cfg = configs[state.selectedMetric];
        
        let regionsHTML = '';
        Object.keys(stats.grouped).forEach(region => {
          let rTotal = 0;
          let provsHTML = '';
          const provinces = stats.grouped[region];
          
          Object.keys(provinces).forEach(prov => {
            let pTotal = 0;
            const dealers = provinces[prov].filter(d => d[state.selectedMetric] > 0);
            
            if (dealers.length > 0) {
              let dealersHTML = dealers.map(d => {
                pTotal += d[state.selectedMetric];
                return `
                  <div class="flex justify-between items-center py-2 pl-16 pr-4 text-sm hover:bg-slate-100">
                    <div class="flex items-center">
                      <i data-lucide="store" class="w-4 h-4 mr-2 text-gray-400"></i>
                      <span class="text-gray-600">${d.dealer}</span>
                    </div>
                    <span class="font-medium ${cfg.color}">${d[state.selectedMetric]} <span class="text-xs text-gray-500">${cfg.unit}</span></span>
                  </div>
                `;
              }).join('');
              
              rTotal += pTotal;
              provsHTML += `
                <div class="border-b border-gray-100 last:border-0">
                  <details class="group">
                    <summary class="w-full flex items-center justify-between p-3 pl-10 bg-white hover:bg-slate-50 transition-colors cursor-pointer select-none">
                      <div class="flex items-center">
                        <i data-lucide="chevron-right" class="w-4 h-4 mr-2 text-gray-400 chevron-icon"></i>
                        <span class="font-semibold text-gray-700">${prov}</span>
                      </div>
                      <span class="font-semibold ${cfg.color}">${pTotal} <span class="text-xs font-normal text-gray-500">${cfg.unit}</span></span>
                    </summary>
                    <div class="bg-slate-50 py-2 border-t border-gray-100">${dealersHTML}</div>
                  </details>
                </div>
              `;
            }
          });
          
          if (rTotal > 0) {
            regionsHTML += `
              <div class="border border-gray-200 rounded-lg overflow-hidden">
                <details class="group">
                  <summary class="w-full flex items-center justify-between p-4 bg-gray-50 hover:bg-gray-100 transition-colors cursor-pointer select-none">
                    <div class="flex items-center">
                      <i data-lucide="chevron-right" class="w-5 h-5 mr-2 text-gray-500 chevron-icon"></i>
                      <span class="font-bold text-gray-800 text-lg">${region}</span>
                    </div>
                    <span class="font-bold text-lg ${cfg.color}">${rTotal} <span class="text-sm font-normal text-gray-500">${cfg.unit}</span></span>
                  </summary>
                  <div class="p-0 border-t border-gray-200 bg-white">${provsHTML}</div>
                </details>
              </div>
            `;
          }
        });

        if (!regionsHTML) {
          bottomView = `
            <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100 mt-6 text-center">
              <i data-lucide="package" class="w-12 h-12 text-gray-300 mx-auto mb-3"></i>
              <p class="text-gray-500 text-lg">ยังไม่มีข้อมูลสำหรับ <span class="font-bold">"${cfg.label}"</span></p>
            </div>
          `;
        } else {
          bottomView = `
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 mt-6 animate-in fade-in duration-300">
              <div class="flex justify-between items-center mb-6 border-b border-gray-100 pb-4">

                <span class="text-sm text-gray-500">คลิกที่รายการเพื่อดูข้อมูลแต่ละระดับ</span>
              </div>
              <div class="space-y-3">${regionsHTML}</div>
            </div>
          `;
        }

      } else {
        // Standard View
        const invRows = state.inventory.map(item => `
          <tr class="border-b border-gray-50 last:border-0 text-sm">
            <td class="p-3 text-gray-800">${item.dealer}</td>
            <td class="p-3 text-gray-600"><div class="font-medium">${item.model}</div><div class="text-xs">${item.color}</div></td>
            <td class="p-3 text-right font-medium text-blue-600">${item.qty} คัน</td>
          </tr>
        `).join('') || `<tr><td colspan="3" class="text-center py-4 text-gray-500">ยังไม่มีข้อมูลสต็อกรถ</td></tr>`;

        const bookRows = state.bookings.map(b => `
          <tr class="border-b border-gray-50 last:border-0 text-sm">
            <td class="p-3 text-gray-800 font-medium">${b.customerName}</td>
            <td class="p-3 text-gray-600"><div class="text-xs font-semibold text-gray-500">${b.dealer}</div><div>${b.model} - ${b.color}</div></td>
            <td class="p-3 text-right">

                ? `<span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-orange-100 text-orange-700">รอรับรถ</span>`

              }
            </td>
          </tr>
        `).join('') || `<tr><td colspan="3" class="text-center py-4 text-gray-500">ยังไม่มีข้อมูลการจอง</td></tr>`;

        bottomView = `
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6 animate-in fade-in duration-300">

              <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center"><i data-lucide="package" class="w-5 h-5 mr-2 text-gray-500"></i> สต็อกล่าสุด (รายดีลเลอร์)</h3>
              <div class="overflow-x-auto">

                  <thead class="bg-gray-50 text-gray-600 text-sm"><tr><th class="p-3 rounded-tl-lg">ดีลเลอร์</th><th class="p-3">รุ่นรถ / สีรถ</th><th class="p-3 rounded-tr-lg text-right">จำนวนทั้งหมด</th></tr></thead>
                  <tbody>${invRows}</tbody>

              <div class="overflow-x-auto">

      return `

          <div class="flex justify-between items-end">
            <h2 class="text-2xl font-bold text-gray-800">ภาพรวมระบบ (Overview)</h2>

          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            ${statCard("รถเข้ามาทั้งหมด", stats.totalCars, "car", "totalCars", "bg-blue-100", "text-blue-600", "ring-blue-500")}
            ${statCard("จองแล้ว (รอรับรถ)", stats.totalBooked, "users", "totalBooked", "bg-orange-100", "text-orange-600", "ring-orange-500")}
            ${statCard("สถานะรถขาด (Shortage)", stats.totalShortage, "alert-triangle", "totalShortage", "bg-red-100", "text-red-600", "ring-red-500")}

                      ${getDatalistHTML('dl-provs', provinces)}

              <h3 class="font-bold text-gray-800 mb-4 border-b pb-2 flex items-center justify-between">
                <span>จัดการรายการสต็อก</span>
                ${state.dealerForm.dealer ? `<span class="text-sm font-normal text-blue-600 bg-blue-50 px-2 py-1 rounded">แสดงข้อมูล: ${state.dealerForm.dealer}</span>` : ''}
              </h3>
              <div class="overflow-x-auto">
                <table class="w-full text-left">
                  <thead class="bg-gray-50 text-gray-600 text-sm"><tr><th class="p-3 rounded-tl-lg w-1/2">รุ่นรถและสี</th><th class="p-3 text-center">จำนวนทั้งหมด</th><th class="p-3 rounded-tr-lg text-right w-1/4">จัดการ</th></tr></thead>
                  <tbody>${invTable}</tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function getBuyerHTML() {
      const provinces = getProvinces();
      const dealers = getDealersByProvince(state.buyerForm.province);
      const disabledClass = state.dealersData.length === 0 ? "opacity-50 cursor-not-allowed" : "";
      const placeholder = state.dealersData.length === 0 ? "-- กรุณาอัปโหลดฐานข้อมูลก่อน --" : "-- พิมพ์เพื่อค้นหา --";
      const dealerInfo = getDealerInfo(state.buyerForm.dealer, state.buyerForm.province);

      const activeBookings = state.bookings.filter(b => b.status === 'booked');
      const bookRows = activeBookings.length === 0 
        ? `<p class="text-gray-500 text-center py-6">ไม่มีรายการจองที่ค้างอยู่</p>`
        : `<div class="space-y-3">` + activeBookings.map(b => {
            if (state.editingBookingId === b.id) {
              return `
                <div class="border border-blue-200 p-4 rounded-lg bg-blue-50 shadow-sm">
                  <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-3">
                    <div>
                      <label class="text-xs text-gray-500 mb-1 block">ชื่อลูกค้า</label>
                      <input type="text" id="edit-b-name-${b.id}" value="${b.customerName}" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm">
                    </div>
                    <div>
                      <label class="text-xs text-gray-500 mb-1 block">รุ่นรถ</label>
                      <select id="edit-b-model-${b.id}" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm">
                        ${CAR_MODELS.map(m => `<option value="${m}" ${m===b.model?'selected':''}>${m}</option>`).join('')}
                      </select>
                    </div>
                    <div>
                      <label class="text-xs text-gray-500 mb-1 block">สีรถ</label>
                      <select id="edit-b-color-${b.id}" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm">
                        ${CAR_COLORS.map(c => `<option value="${c}" ${c===b.color?'selected':''}>${c}</option>`).join('')}
                      </select>
                    </div>
                  </div>
                  <div class="flex justify-end space-x-2 mt-2">
                    <button type="button" onclick="appActions.saveEditBooking('${b.id}')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded text-sm transition-colors">บันทึกการแก้ไข</button>
                    <button type="button" onclick="appActions.cancelEditBooking()" class="bg-gray-300 hover:bg-gray-400 text-gray-700 px-4 py-1.5 rounded text-sm transition-colors">ยกเลิก</button>
                  </div>
                </div>
              `;
            } else {
              return `
                <div class="border border-gray-100 p-4 rounded-lg flex flex-col md:flex-row justify-between items-start md:items-center bg-gray-50 hover:bg-white hover:shadow-sm transition-all duration-200">
                  <div class="mb-3 md:mb-0">
                    <p class="font-bold text-gray-800 text-lg">${b.customerName}</p>
                    <p class="text-sm text-gray-600 mt-1">
                      <i data-lucide="store" class="w-4 h-4 inline mr-1 text-gray-400"></i> ${b.dealer} 
                      <span class="mx-2">|</span><span class="font-medium">รุ่น:</span> ${b.model} 
                      <span class="mx-1"></span><span class="font-medium">สี:</span> ${b.color}
                    </p>
                  </div>
                  <div class="flex flex-wrap gap-2 w-full md:w-auto">
                    <button onclick="appActions.startEditBooking('${b.id}')" class="p-2 text-blue-500 hover:bg-blue-100 rounded-lg transition-colors border border-blue-200 bg-white" title="แก้ไขรายการ">
                      <i data-lucide="edit-2" class="w-4 h-4"></i>
                    </button>
                    <button onclick="appActions.deleteBooking('${b.id}')" class="p-2 text-red-500 hover:bg-red-100 rounded-lg transition-colors border border-red-200 bg-white" title="ยกเลิกการจอง">
                      <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                    <button onclick="appActions.receiveCar('${b.id}')" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center transition-colors">
                      <i data-lucide="check-circle" class="w-4 h-4 mr-2"></i> ยืนยันการรับรถ
                    </button>
                  </div>
                </div>
              `;
            }
          }).join('') + `</div>`;

      return `
        <div class="max-w-3xl mx-auto space-y-8">
          <div class="text-center">
            <h2 class="text-2xl font-bold text-gray-800">ระบบลูกค้า (จองและรับรถ)</h2>
            <p class="text-gray-500 mt-2">ลงทะเบียนการจองรถ หรือยืนยันการรับรถแล้ว</p>
          </div>
          <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">แบบฟอร์มบันทึกการจอง</h3>
            <form id="buyer-form" onsubmit="appActions.submitBuyerForm(event)" class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อ-นามสกุล ผู้จอง</label>
                <!-- ใส่ค่ากลับเข้าไปอัตโนมัติ -->
                <input type="text" name="customerName" value="${state.buyerForm.customerName}" class="w-full p-2.5 border border-gray-300 rounded-lg bg-gray-50 focus:ring-2 focus:ring-orange-500 focus:border-orange-500" required placeholder="กรอกชื่อของคุณ">
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4 relative z-20">
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">เลือก/ค้นหา จังหวัด</label>
                  <div class="relative w-full">
                    <i data-lucide="map-pin" class="absolute left-3 top-3 w-5 h-5 text-gray-400 z-10"></i>
                    <!-- เปลี่ยน oninput เป็น onchange -->
                    <input list="buy-provs" name="province" class="w-full pl-10 pr-10 p-2.5 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-orange-500 focus:border-orange-500 ${disabledClass}" placeholder="${placeholder}" ${state.dealersData.length===0?'disabled':''} value="${state.buyerForm.province}" onchange="appActions.buyerProvinceChange(this.value)" required autocomplete="off">
                    ${getDatalistHTML('buy-provs', provinces)}
                  </div>
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">เลือก/ค้นหา ดีลเลอร์</label>
                  <div class="relative w-full">
                    <i data-lucide="store" class="absolute left-3 top-3 w-5 h-5 text-gray-400 z-10"></i>
                    <input list="buy-dealers" name="dealer" class="w-full pl-10 pr-10 p-2.5 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-orange-500 focus:border-orange-500 ${!state.buyerForm.province ? 'opacity-50' : ''}" placeholder="${state.buyerForm.province ? placeholder : '-- เลือกจังหวัดก่อน --'}" ${!state.buyerForm.province?'disabled':''} value="${state.buyerForm.dealer}" onchange="appActions.buyerNameChange(this.value)" required autocomplete="off">
                    ${getDatalistHTML('buy-dealers', dealers)}
                  </div>
                </div>
              </div>
              ${getDealerInfoCardHTML(dealerInfo)}
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">รุ่นรถที่จอง</label>
                  <select name="model" class="w-full p-2.5 border border-gray-300 rounded-lg bg-gray-50 focus:ring-2 focus:ring-orange-500 focus:border-orange-500" required>
                    <option value="">-- ระบุรุ่นรถ --</option>
                    ${CAR_MODELS.map(m => `<option value="${m}" ${state.buyerForm.model === m ? 'selected' : ''}>${m}</option>`).join('')}
                  </select>
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-1">สีรถที่จอง</label>
                  <select name="color" class="w-full p-2.5 border border-gray-300 rounded-lg bg-gray-50 focus:ring-2 focus:ring-orange-500 focus:border-orange-500" required>
                    <option value="">-- ระบุสี --</option>
                    ${CAR_COLORS.map(c => `<option value="${c}" ${state.buyerForm.color === c ? 'selected' : ''}>${c}</option>`).join('')}
                  </select>
                </div>
              </div>
              <button type="submit" class="w-full mt-4 bg-orange-600 hover:bg-orange-700 text-white font-medium py-3 px-4 rounded-lg flex justify-center items-center transition-colors">
                <i data-lucide="car" class="w-5 h-5 mr-2"></i> บันทึกการจองรถ
              </button>
            </form>
          </div>
          <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">รายการจองของลูกค้าทั้งหมด (รอรับรถ)</h3>
            ${bookRows}
          </div>
        </div>
      `;
    }

    function getDatabaseHTML() {
      if (!state.isAdmin) {
        return `
          <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-200 mt-10">
            <div class="text-center mb-6">
              <div class="bg-emerald-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="lock" class="w-8 h-8 text-emerald-600"></i>
              </div>
              <h2 class="text-2xl font-bold text-gray-800">เข้าสู่ระบบ (Admin)</h2>
              <p class="text-gray-500 mt-2 text-sm">กรุณาเข้าสู่ระบบเพื่อจัดการฐานข้อมูลสาขา</p>
            </div>
            <form onsubmit="appActions.adminLogin(event)" class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อผู้ใช้ (Username)</label>
                <input type="text" name="username" required class="w-full p-2.5 border border-gray-300 rounded-lg bg-gray-50 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500" placeholder="กรอกชื่อผู้ใช้">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">รหัสผ่าน (Password)</label>
                <input type="password" name="password" required class="w-full p-2.5 border border-gray-300 rounded-lg bg-gray-50 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500" placeholder="กรอกรหัสผ่าน">
              </div>
              <button type="submit" class="w-full mt-6 bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3 px-4 rounded-lg flex justify-center items-center transition-colors">
                เข้าสู่ระบบ
              </button>
            </form>
          </div>
        `;
      }

      const tableRows = state.dealersData.length === 0 
        ? `<tr><td colspan="3" class="p-8 text-center text-gray-500">ยังไม่มีข้อมูลในระบบ กรุณาอัปโหลดไฟล์ Excel</td></tr>`
        : state.dealersData.map(d => `
            <tr class="border-b border-gray-100 last:border-0 hover:bg-gray-50">
              <td class="p-3 text-gray-600">${d.region}</td>
              <td class="p-3 text-gray-800 font-medium">${d.province}</td>
              <td class="p-3 text-gray-700">${d.name}</td>
            </tr>
          `).join('');

      return `
        <div class="max-w-4xl mx-auto space-y-6">
          <div class="flex flex-col md:flex-row justify-between items-center mb-8 border-b border-gray-200 pb-4">
            <div class="text-center md:text-left mb-4 md:mb-0">
              <h2 class="text-2xl font-bold text-gray-800">จัดการฐานข้อมูลสาขา</h2>
              <p class="text-gray-500 mt-2">อัปโหลดไฟล์ Excel (.xls, .xlsx) เพื่ออัปเดตรายชื่อสาขาเข้าสู่ระบบคลาวด์</p>
            </div>
            <button onclick="appActions.adminLogout()" class="flex items-center px-4 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg transition-colors border border-red-200 bg-white">
              <i data-lucide="log-out" class="w-4 h-4 mr-2"></i> ออกจากระบบ
            </button>
          </div>
          <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-200 text-center">
            <i data-lucide="file-spreadsheet" class="w-16 h-16 text-emerald-500 mx-auto mb-4"></i>
            <h3 class="text-lg font-bold text-gray-800 mb-2">นำเข้าไฟล์ Excel รายชื่อผู้แทนจำหน่าย</h3>
            <p class="text-sm text-gray-600 mb-6 max-w-md mx-auto">
              คุณสามารถนำไฟล์ <strong>OMODA_JAECOO_Thailand_Dealers.xlsx</strong> มาอัปโหลดได้โดยตรง ข้อมูลจะถูกบันทึกขึ้นระบบ Cloud ทันที
            </p>
            <div class="relative inline-block">
              <input type="file" accept=".xls,.xlsx" onchange="appActions.uploadExcel(event)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer text-0">
              <button type="button" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3 px-6 rounded-lg flex items-center transition-colors pointer-events-none">
                <i data-lucide="upload" class="w-5 h-5 mr-2"></i> อัปโหลดไฟล์ Excel ขึ้นระบบ
              </button>
            </div>
          </div>
          <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-4 bg-gray-50 border-b border-gray-200 flex justify-between items-center">
              <h3 class="font-bold text-gray-800 flex items-center">
                <i data-lucide="database" class="w-5 h-5 mr-2 text-blue-600"></i> ตัวอย่างฐานข้อมูลปัจจุบันบนระบบ Cloud (${state.dealersData.length} สาขา)
              </h3>
            </div>
            <div class="overflow-x-auto max-h-96">
              <table class="w-full text-left text-sm">
                <thead class="bg-white sticky top-0 shadow-sm text-gray-600">
                  <tr><th class="p-3 font-semibold whitespace-nowrap">ภูมิภาค</th><th class="p-3 font-semibold whitespace-nowrap">จังหวัด</th><th class="p-3 font-semibold whitespace-nowrap">ชื่อโชว์รูม/ศูนย์บริการ</th></tr>
                </thead>
                <tbody>${tableRows}</tbody>
              </table>
            </div>
          </div>
        </div>
      `;
    }

    renderApp();

  </script>
</body>
</html>
